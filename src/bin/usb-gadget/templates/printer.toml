# USB printer gadget.
#
# Usage:
#   usb-gadget up printer.toml

name = "printer"
# udc = "dummy_udc.0"

[device]
vendor = 0x1209
product = 0x0001
manufacturer = "Example Inc."
product_name = "USB Printer"
serial = "0001"

[[config]]
description = "Default"
max_power = 250

[[config.function]]
type = "printer"
pnp_string = "MFG:Example Inc.;MDL:USB Printer;CLS:PRINTER;"
qlen = 10
