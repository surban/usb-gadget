name: Test with dummy_hcd

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-dummy-hcd:
    name: Tests with dummy_hcd loopback UDC
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Rust
        run: rustup update

      - name: Install kernel modules
        run: |
          set -euo pipefail
          sudo apt-get update

          KVER=$(uname -r)
          echo "Running kernel: $KVER"

          # Install modules-extra for the running (Azure) kernel first.
          sudo apt-get install -y "linux-modules-extra-${KVER}" || true

          # The Azure kernel is built without CONFIG_USB_GADGET, so
          # libcomposite / dummy_hcd are not shipped in its modules-extra
          # package.  Work around this by downloading the *generic* kernel's
          # modules-extra .deb (same upstream version) and extracting the
          # USB gadget .ko files into the running kernel's module tree.
          if ! modinfo libcomposite >/dev/null 2>&1; then
            echo "libcomposite not found in Azure kernel modules — extracting from generic kernel"

            # Derive the generic kernel version from the Azure one.
            #   Azure:   6.14.0-1017-azure  →  base 6.14.0
            #   Generic: 6.14.0-<ABI>-generic
            BASE_KVER=$(echo "$KVER" | sed 's/-[0-9]*-azure$//')
            echo "Base kernel version: $BASE_KVER"

            # Find the matching generic modules-extra package.
            GENERIC_PKG=$(apt-cache search "linux-modules-extra-${BASE_KVER}.*generic" \
                          | head -1 | awk '{print $1}')

            if [ -z "$GENERIC_PKG" ]; then
              echo "ERROR: Could not find a generic linux-modules-extra package for ${BASE_KVER}"
              apt-cache search "linux-modules-extra" | grep generic | head -10
              exit 1
            fi
            echo "Generic package: $GENERIC_PKG"

            # Download (don't install) and extract into a temp directory.
            cd /tmp
            apt-get download "$GENERIC_PKG"
            DEB_FILE=$(ls linux-modules-extra-*generic*.deb | head -1)
            mkdir -p /tmp/generic-modules
            dpkg-deb -x "$DEB_FILE" /tmp/generic-modules

            # Find the extracted module tree.
            GENERIC_MODDIR=$(find /tmp/generic-modules/lib/modules -mindepth 1 -maxdepth 1 -type d | head -1)
            echo "Generic module dir: $GENERIC_MODDIR"

            # Copy USB gadget modules into the running kernel's module tree.
            DEST="/lib/modules/${KVER}"
            if [ -d "$GENERIC_MODDIR/kernel/drivers/usb/gadget" ]; then
              sudo cp -rv "$GENERIC_MODDIR/kernel/drivers/usb/gadget" "$DEST/kernel/drivers/usb/"
            fi
            # Also copy USB common modules if present (e.g. usb-common for OTG).
            if [ -d "$GENERIC_MODDIR/kernel/drivers/usb/common" ]; then
              sudo cp -rv "$GENERIC_MODDIR/kernel/drivers/usb/common" "$DEST/kernel/drivers/usb/"
            fi

            # Rebuild module dependency database.
            sudo depmod -a "$KVER"

            # Leave a marker so the load step knows to use --force-vermagic.
            touch /tmp/.usb_gadget_modules_extracted

            echo "Module extraction complete"
            cd -
          fi

      - name: Load dummy_hcd and gadget modules
        run: |
          # When modules were extracted from the generic kernel, they have a
          # different vermagic (e.g. 6.14.0-24-generic vs 6.14.0-1017-azure).
          # Use --force-vermagic so the kernel accepts them.  This is safe
          # because both kernels share the same upstream base version and ABI.
          FORCE=""
          if [ -f /tmp/.usb_gadget_modules_extracted ]; then
            FORCE="--force-vermagic"
            echo "Using --force-vermagic for cross-kernel modules"
          fi

          # Load configfs (usually already present, but be safe).
          sudo modprobe $FORCE configfs

          # Load the USB gadget core and configfs integration.
          sudo modprobe $FORCE libcomposite

          # Load dummy_hcd with SuperSpeed support for throughput benchmarks.
          sudo modprobe $FORCE dummy_hcd is_super_speed=Y

          # Load all the USB gadget function modules the test suite needs.
          sudo modprobe $FORCE usb_f_fs           || echo "Warning: usb_f_fs not available"
          sudo modprobe $FORCE usb_f_acm          || echo "Warning: usb_f_acm not available"
          sudo modprobe $FORCE usb_f_serial       || sudo modprobe $FORCE usb_f_gser || echo "Warning: usb_f_serial/usb_f_gser not available"
          sudo modprobe $FORCE usb_f_ecm          || echo "Warning: usb_f_ecm not available"
          sudo modprobe $FORCE usb_f_eem          || echo "Warning: usb_f_eem not available"
          sudo modprobe $FORCE usb_f_ncm          || echo "Warning: usb_f_ncm not available"
          sudo modprobe $FORCE usb_f_rndis        || echo "Warning: usb_f_rndis not available"
          sudo modprobe $FORCE usb_f_ecm_subset   || sudo modprobe $FORCE usb_f_subset || echo "Warning: usb_f_ecm_subset/usb_f_subset not available"
          sudo modprobe $FORCE usb_f_hid          || echo "Warning: usb_f_hid not available"
          sudo modprobe $FORCE usb_f_mass_storage || echo "Warning: usb_f_mass_storage not available"
          sudo modprobe $FORCE usb_f_printer      || echo "Warning: usb_f_printer not available"
          sudo modprobe $FORCE usb_f_midi         || echo "Warning: usb_f_midi not available"
          sudo modprobe $FORCE usb_f_uac2         || echo "Warning: usb_f_uac2 not available"
          sudo modprobe $FORCE usb_f_uvc          || echo "Warning: usb_f_uvc not available"

      - name: Verify dummy_hcd is loaded
        run: |
          echo "=== Loaded USB gadget modules ==="
          lsmod | grep -E 'dummy_hcd|libcomposite|usb_f_|configfs' || true
          echo ""

          echo "=== UDC devices ==="
          ls -la /sys/class/udc/ || true
          echo ""

          # Verify at least one UDC is present.
          if [ -z "$(ls /sys/class/udc/ 2>/dev/null)" ]; then
            echo "ERROR: No UDC found after loading dummy_hcd"
            exit 1
          fi

          echo "=== UDC details ==="
          for udc in /sys/class/udc/*; do
            echo "UDC: $(basename $udc)"
            echo "  max_speed: $(cat $udc/max_speed 2>/dev/null || echo 'N/A')"
            echo "  current_speed: $(cat $udc/current_speed 2>/dev/null || echo 'N/A')"
            driver=$(readlink $udc/device/driver 2>/dev/null | xargs basename 2>/dev/null || echo 'N/A')
            echo "  driver: $driver"
          done

          echo ""
          echo "=== configfs mounts ==="
          mount | grep configfs || true

      - name: Build (release, all features)
        run: cargo build --release --all-features --all-targets

      - name: Run tests (release)
        run: |
          # Run all tests in release mode as root.
          # Release mode is needed for the throughput benchmark floor assertions.
          # Do NOT set SKIP_HOST — dummy_hcd provides both device and host sides
          # in the same kernel, so host-side verification works.
          sudo -E env "PATH=$PATH" \
            "HOME=$HOME" \
            "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" \
            "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" \
            RUST_LOG=info \
            RUST_BACKTRACE=1 \
            cargo test --release --all-features -- --nocapture --test-threads=1
        timeout-minutes: 10

      - name: Cleanup
        if: always()
        run: |
          # Remove any leftover gadgets.
          for gadget in /sys/kernel/config/usb_gadget/*/; do
            if [ -d "$gadget" ]; then
              echo "" | sudo tee "${gadget}UDC" 2>/dev/null || true
            fi
          done
          sudo modprobe -r dummy_hcd 2>/dev/null || true